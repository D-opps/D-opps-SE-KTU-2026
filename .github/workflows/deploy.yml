name: DormLife Backend CI

on:
  push:
    branches: [ "main", "DOSK2-177" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    # Вказуємо, що команди мають виконуватися всередині папки backend
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django djangorestframework djangorestframework-simplejwt django-cors-headers django-rest-passwordreset pillow requests

      - name: Run Django Tests
        env:
          # Передаємо секрети, які ти додала в Settings -> Secrets
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python manage.py test