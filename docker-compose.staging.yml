version: "3.9"

services:
  db:
    image: postgres:15
    container_name: staging_db
    restart: always
    env_file:
      - .env.staging
    ports:
      - "5433:5432"
    volumes:
      - staging_db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: staging_backend
    restart: always
    env_file:
      - .env.staging
    depends_on:
      - db
    ports:
      - "8001:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  staging_db_data: